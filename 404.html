<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Ahmed Artist</title>
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://ahmedabdullaa.github.io">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: #0a0a0f;
            color: #F5F0E8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        .gold {
            background: linear-gradient(135deg, #C9A96E, #E8D5A3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        h1 {
            font-family: 'DM Serif Display', Georgia, serif;
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 400;
            line-height: 1;
            letter-spacing: -4px;
        }
        p {
            font-size: clamp(1rem, 2vw, 1.2rem);
            color: rgba(245, 240, 232, 0.55);
            margin: 16px 0 32px;
            line-height: 1.7;
        }
        a {
            display: inline-flex;
            padding: 14px 34px;
            border-radius: 100px;
            background: linear-gradient(135deg, #C9A96E, #E8D5A3);
            color: #0a0a0f;
            font-weight: 500;
            text-decoration: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        a:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 40px rgba(201, 169, 110, 0.25);
        }
    </style>
</head>
<body>
    <div>
        <h1>4<span class="gold">0</span>4</h1>
        <p>The page you're looking for doesn't exist.<br>It may have moved or the link may be incorrect.</p>
        <a href="/">Back to Home</a>
    </div>
</body>
</html>
